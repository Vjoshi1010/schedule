<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Lock In"/>
<meta name="theme-color" content="#ffffff"/>
<title>Lock In</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f5f5f5;
    --card: #f8f8f8;
    --border: #e8e8e8;
    --text: #111111;
    --dim: #666666;
    --muted: #aaaaaa;
    --black: #111111;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; color: var(--text); overscroll-behavior: none; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }
  #header { padding: 20px 20px 0; flex-shrink: 0; }
  #tabs-wrap { padding: 0 20px; margin-top: 16px; flex-shrink: 0; }
  #content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 20px calc(20px + var(--safe-bot)); }

  /* ── Header ── */
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .header-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .header-title { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .header-date { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .streak-badge { display: flex; flex-direction: column; align-items: center; background: var(--black); color: #fff; border-radius: 14px; padding: 8px 14px; }
  .streak-num { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .streak-label { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #aaa; margin-top: 2px; }

  /* ── Week rings ── */
  #week-rings { display: flex; gap: 8px; margin-top: 20px; justify-content: space-between; }
  .ring-day { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
  .ring-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .ring-label.active { color: var(--black); }
  .ring-svg { width: 100%; max-width: 42px; }

  /* ── Tabs ── */
  #tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  #tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 7px 14px; border-radius: 99px; font-size: 13px; font-weight: 600; border: 1.5px solid var(--border); background: transparent; color: var(--dim); cursor: pointer; transition: all 0.15s; letter-spacing: -0.01em; }
  .tab.active { background: var(--black); color: #fff; border-color: var(--black); }

  /* ── Progress bar ── */
  #progress-wrap { margin-bottom: 18px; }
  .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .progress-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .progress-pct { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; }
  .progress-bar-bg { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--black); border-radius: 99px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }

  /* ── Section ── */
  .section { margin-bottom: 24px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-left: 2px; }

  /* ── Task card ── */
  .task { display: flex; align-items: flex-start; gap: 12px; padding: 13px 14px; background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; margin-bottom: 7px; cursor: pointer; transition: background 0.12s, border-color 0.12s; user-select: none; }
  .task.done { background: #f0f0f0; }
  .task.done .task-name { text-decoration: line-through; color: var(--muted); }
  .task.done .task-time { color: var(--muted); }
  .task-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin-top: 1px; }
  .task.done .task-check { background: var(--black); border-color: var(--black); }
  .checkmark { display: none; }
  .task.done .checkmark { display: block; }
  .task-body { flex: 1; min-width: 0; }
  .task-time { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.03em; margin-bottom: 2px; }
  .task-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; line-height: 1.3; }
  .task-note { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; display: none; }
  .task.expanded .task-note { display: block; }
  .task-dur { font-size: 11px; color: var(--muted); flex-shrink: 0; margin-top: 2px; }

  /* ── Focus card ── */
  #focus-card { background: var(--black); color: #fff; border-radius: 18px; padding: 18px 20px; margin-bottom: 20px; }
  .focus-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #666; margin-bottom: 6px; }
  .focus-quote { font-size: 15px; font-weight: 600; line-height: 1.5; letter-spacing: -0.01em; color: #eee; }
  .focus-author { font-size: 11px; color: #555; margin-top: 8px; }

  /* ── Stats card ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 14px 16px; }
  .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 500; }

  /* ── Coach tip ── */
  .coach-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 16px 18px; margin-bottom: 16px; }
  .coach-title { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .coach-item { font-size: 13px; color: var(--dim); line-height: 1.6; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .coach-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .coach-item strong { color: var(--text); font-weight: 700; }

  /* ── Reset note ── */
  .reset-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 20px; padding-bottom: 4px; }

  /* ── Animations ── */
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .pop { animation: pop 0.2s ease; }
</style>
</head>

const jsDay = new Date().getDay(); // 0=Sun
const dayMap = [6,0,1,2,3,4,5];   // js→Mon-index

function getKey(dayIdx) {
  return `lockin_${DAYS[dayIdx]}_${getTodayStr()}`;
}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function getWeekKey(dayIdx) {
  // Completion pct stored per calendar day (Mon of current week)
  const d = new Date();
  const monday = new Date(d);
  monday.setDate(d.getDate() - dayMap[jsDay] + dayIdx);
  return `lockin_pct_${monday.getFullYear()}-${monday.getMonth()}-${monday.getDate()}`;
}

function loadChecked(dayIdx) {
  try { return JSON.parse(localStorage.getItem(getKey(dayIdx)) || '[]'); } catch { return []; }
}

function saveChecked(dayIdx, arr) {
  localStorage.setItem(getKey(dayIdx), JSON.stringify(arr));
  // Save pct for week rings
  const day = SCHEDULE[DAYS[dayIdx]];
  const total = day.sections.reduce((a,s)=>a+s.tasks.length,0);
  const pct = total ? Math.round(arr.length/total*100) : 0;
  localStorage.setItem(getWeekKey(dayIdx), pct);
}

function loadWeekPcts() {
  return DAYS.map((_,i) => {
    const v = localStorage.getItem(getWeekKey(i));
    return v !== null ? parseInt(v) : null;
  });
}

function getStreak() {
  let streak = 0;
  const now = new Date();
  for (let i = 0; i < 30; i++) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    const key = `lockin_streak_${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if (localStorage.getItem(key) === '1') streak++;
    else if (i > 0) break;
  }
  return streak;
}

function markStreakToday() {
  const d = new Date();
  const key = `lockin_streak_${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  localStorage.setItem(key, '1');
}

  const circ = 2 * Math.PI * r;
  const dash = pct !== null ? (pct / 100) * circ : 0;
  const color = isToday ? '#111' : (pct > 0 ? '#555' : '#ddd');
  const bg = '#ebebeb';
  return `<svg class="ring-svg" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${bg}" stroke-width="${sw}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round"
      style="transition:stroke-dasharray 0.5s ease"/>
    <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle"
      font-size="9" font-weight="700" fill="${isToday?'#111':'#888'}" font-family="-apple-system,sans-serif">
      ${pct !== null ? pct+'%' : ''}
    </text>
  </svg>`;
}

function renderHeader() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
  document.getElementById('date-display').textContent = dateStr;

  const title = document.querySelector('.header-title');
  const hour = now.getHours();
  if (hour < 8) title.textContent = 'Rise up.';
  else if (hour < 12) title.textContent = 'Lock in.';
  else if (hour < 17) title.textContent = 'Keep going.';
  else if (hour < 20) title.textContent = 'Finish strong.';
  else title.textContent = 'Rest earned.';

  document.getElementById('streak-num').textContent = getStreak();
}

function renderWeekRings() {
  const pcts = loadWeekPcts();
  const wrap = document.getElementById('week-rings');
  wrap.innerHTML = DAYS.map((d, i) => {
    const isToday = i === dayMap[jsDay];
    return `<div class="ring-day" onclick="switchDay(${i})">
      ${ring(pcts[i], 36, isToday)}
      <div class="ring-label${isToday?' active':''}">${d}</div>
    </div>`;
  }).join('');
}

function renderTabs() {
  const wrap = document.getElementById('tabs');
  wrap.innerHTML = DAYS.map((d,i) => {
    const isToday = i === dayMap[jsDay];
    return `<button class="tab${i===activeDay?' active':''}" onclick="switchDay(${i})">${d}${isToday?' ·':''}</button>`;
  }).join('');
}

function renderContent() {
  const key = DAYS[activeDay];
  const day = SCHEDULE[key];
  const checked = loadChecked(activeDay);
  const totalTasks = day.sections.reduce((a,s)=>a+s.tasks.length,0);
  const doneTasks = checked.length;
  const pct = totalTasks ? Math.round(doneTasks/totalTasks*100) : 0;
  const isToday = activeDay === dayMap[jsDay];

  const q = QUOTES[new Date().getDay() % QUOTES.length];

  let html = '';

  // Focus card
  html += `<div id="focus-card">
    <div class="focus-eyebrow">Today's mindset</div>
    <div class="focus-quote">"${q[0]}"</div>
    <div class="focus-author">— ${q[1]}</div>
  </div>`;

  // Progress
  html += `<div id="progress-wrap">
    <div class="progress-header">
      <div class="progress-title">${DAY_FULL[activeDay]} · ${day.label}</div>
      <div class="progress-pct">${pct}%</div>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${day.note}</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
  </div>`;

  // Stats
  html += `<div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value">${doneTasks}/${totalTasks}</div>
      <div class="stat-label">Tasks done</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${getStreak()}</div>
      <div class="stat-label">Day streak</div>
    </div>
  </div>`;

  // Sections + tasks
  day.sections.forEach((section, si) => {
    html += `<div class="section"><div class="section-label">${section.name}</div>`;
    section.tasks.forEach((task, ti) => {
      const id = `${si}-${ti}`;
      const done = checked.includes(id);
      html += `<div class="task${done?' done':''}" id="task-${id}" onclick="toggleTask('${id}','${key}')">
        <div class="task-check">
          <svg class="checkmark" width="11" height="9" viewBox="0 0 11 9" fill="none">
            <path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="task-body">
          <div class="task-time">${task.time}</div>
          <div class="task-name">${task.name}</div>
          ${task.note ? `<div class="task-note">${task.note}</div>` : ''}
        </div>
        <div class="task-dur">${task.dur}</div>
      </div>`;
    });
    html += `</div>`;
  });

  // Coach notes
  html += `<div class="coach-card">
    <div class="coach-title">Coach Notes</div>
    <div class="coach-item"><strong>ACT Review</strong> — 60 min on all ACT days. Every wrong answer. This is where scores go from 32 to 35.</div>
    <div class="coach-item"><strong>Professor Outreach</strong> — Live inside First Impression time Mon/Wed/Sun. Draft, edit, send. Don't wait for perfect.</div>
    <div class="coach-item"><strong>Sleep</strong> — Phone away 9pm, out by 10. The schedule only works if you sleep.</div>
    <div class="coach-item"><strong>Tap any task</strong> to expand notes. Tap again to collapse.</div>
  </div>`;

  html += `<div class="reset-note">Checkboxes auto-reset each day at midnight</div>`;

  document.getElementById('content').innerHTML = html;

  // Long-press to expand note
  document.querySelectorAll('.task').forEach(el => {
    let timer;
    el.addEventListener('touchstart', () => { timer = setTimeout(() => el.classList.toggle('expanded'), 400); }, {passive:true});
    el.addEventListener('touchend', () => clearTimeout(timer), {passive:true});
  });
}

function toggleTask(id, dayKey) {
  // Don't fire if expanding note
  const dayIdx = DAYS.indexOf(dayKey);
  let checked = loadChecked(dayIdx);
  const taskEl = document.getElementById(`task-${id}`);

  if (checked.includes(id)) {
    checked = checked.filter(x => x !== id);
    taskEl.classList.remove('done');
  } else {
    checked.push(id);
    taskEl.classList.add('done');
    taskEl.classList.add('pop');
    setTimeout(() => taskEl.classList.remove('pop'), 200);
  }

  saveChecked(dayIdx, checked);

  // Update progress bar + pct
  const day = SCHEDULE[dayKey];
  const total = day.sections.reduce((a,s)=>a+s.tasks.length,0);
  const pct = total ? Math.round(checked.length/total*100) : 0;
  document.querySelector('.progress-bar-fill').style.width = pct + '%';
  document.querySelector('.progress-pct').textContent = pct + '%';
  document.querySelector('.stat-value').textContent = `${checked.length}/${total}`;

  if (pct === 100) markStreakToday();
  renderWeekRings();
  document.getElementById('streak-num').textContent = getStreak();
}

function switchDay(idx) {
  activeDay = idx;
  renderTabs();
  renderContent();
  document.getElementById('content').scrollTop = 0;
}

// ─── INIT ────────────────────────────────────────────────────────────────────

renderHeader();
renderWeekRings();
renderTabs();
renderContent();
</script>
</body>
</html>
